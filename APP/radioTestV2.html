<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣業餘無線電資格測試系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 30px 15px;
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
        }
        .main-card {
            max-width: 860px;
            margin: auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .card-header-bar {
            background: linear-gradient(90deg, #0f3460, #533483);
            color: #fff;
            padding: 20px 30px;
            text-align: center;
        }
        .card-header-bar h2 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        .card-body-wrap { padding: 35px; }

        /* Home */
        .upload-zone {
            border: 2px dashed #adb5bd;
            border-radius: 12px;
            padding: 20px;
            background: #f8f9fa;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: #0f3460; }

        /* Info */
        .info-table td { padding: 10px 8px; vertical-align: middle; }
        .info-table td:first-child { font-weight: 600; color: #444; width: 55%; }
        .info-table td:last-child { font-size: 1.1rem; }
        .badge-path { font-size: 0.95rem; padding: 6px 14px; }

        /* Quiz */
        .question-box {
            background: #f0f4ff;
            border-left: 5px solid #0f3460;
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 18px;
            margin-bottom: 10px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            background: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .option-btn:hover:not(:disabled) { border-color: #0f3460; background: #e8f0fe; }
        .option-btn.selected { border-color: #0f3460; background: #dce8ff; font-weight: 600; }
        .option-btn.correct { border-color: #198754; background: #d1f5e0; color: #145a32; font-weight: 700; }
        .option-btn.wrong { border-color: #dc3545; background: #fde8e8; color: #7b1b1b; }
        .option-btn:disabled { cursor: default; }

        .anki-area { margin-top: 18px; }
        .btn-hell { background: #7b1b1b; color: #fff; border: none; }
        .btn-hell:hover { background: #a62020; color: #fff; }
        .btn-hard { background: #e67e22; color: #fff; border: none; }
        .btn-hard:hover { background: #f39c12; color: #fff; }
        .btn-good { background: #1a7a4a; color: #fff; border: none; }
        .btn-good:hover { background: #22a25e; color: #fff; }
        .btn-easy { background: #1565c0; color: #fff; border: none; }
        .btn-easy:hover { background: #1976d2; color: #fff; }

        .progress-bar-wrap { margin-bottom: 18px; }
        .progress { height: 10px; border-radius: 10px; }

        /* Result */
        .score-display { font-size: 3.5rem; font-weight: 800; color: #0f3460; }
        .pass-badge { font-size: 1.5rem; font-weight: 700; padding: 10px 30px; border-radius: 50px; }

        /* Explanation */
        .explain-box {
            background: #fffbea;
            border-left: 5px solid #f0ad00;
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 14px;
            font-size: 0.97rem;
            line-height: 1.75;
            color: #3a3000;
        }
        .explain-box .explain-title {
            font-weight: 700;
            color: #7a5900;
            margin-bottom: 6px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hidden { display: none !important; }
        .text-hell { color: #7b1b1b; }
        .text-hard { color: #e67e22; }
        .text-good { color: #1a7a4a; }
        .text-easy { color: #1565c0; }
    </style>
</head>
<body>
<div class="main-card">

    <!-- ═══════ 首頁 ═══════ -->
    <div id="step-home">
        <div class="card-header-bar">
            <h2 data-i18n="app.title">台灣業餘無線電資格測試系統</h2>
            <div style="font-size:0.85rem;opacity:0.8;margin-top:4px;" data-i18n="app.subtitle">ANKI 權重學習法</div>
        </div>
        <div class="card-body-wrap">
            <div class="upload-zone mb-4">
                <label class="form-label fw-bold mb-2" data-i18n="home.questionFileLabel">📂 題庫檔案 (必要，.csv)</label>
                <input type="file" id="file-q" accept=".csv" class="form-control">
                <div class="form-text" data-i18n="home.questionFileHint">例：無線電通訊方法題庫.csv</div>
            </div>
            <div class="upload-zone mb-4">
                <label class="form-label fw-bold mb-2" data-i18n="home.weightFileLabel">📊 權重檔案 (選擇性，.csv)</label>
                <input type="file" id="file-w" accept=".csv" class="form-control">
                <div class="form-text" data-i18n="home.weightFileHint">例：weight_無線電通訊方法題庫.csv　（省略則以全新等權重開始）</div>
            </div>
            <div class="upload-zone mb-4">
                <label class="form-label fw-bold mb-2" data-i18n="home.explainFileLabel">💡 解題說明檔 (選擇性，.md)</label>
                <input type="file" id="file-e" accept=".md" class="form-control">
                <div class="form-text" data-i18n="home.explainFileHint">例：Ans_射頻干擾預防與排除技術問題解析18題.md　（省略則答題後不顯示解說）</div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold" data-i18n="home.roundSizeLabel">📝 每回合題數</label>
                <div class="d-flex gap-3">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="roundSize" id="r35" value="35" checked>
                        <label class="form-check-label" for="r35" data-i18n="home.round35Label">35 題（通過需 25 題）</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="roundSize" id="r40" value="40">
                        <label class="form-check-label" for="r40" data-i18n="home.round40Label">40 題（通過需 32 題）</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="roundSize" id="r50" value="50">
                        <label class="form-check-label" for="r50" data-i18n="home.round50Label">50 題（通過需 40 題）</label>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary btn-lg w-100 py-3" onclick="handleLoad()" data-i18n="home.loadButton">載入檔案</button>
        </div>
    </div>

    <!-- ═══════ 資訊頁 ═══════ -->
    <div id="step-info" class="hidden">
        <div class="card-header-bar">
            <h2 data-i18n="info.pageTitle">測驗資訊確認</h2>
        </div>
        <div class="card-body-wrap">
            <div id="info-path-msg" class="alert hidden mb-3"></div>
            <div id="info-w-warn" class="alert alert-warning hidden mb-3"></div>
            <div id="info-e-warn" class="alert alert-warning hidden mb-3"></div>
            <table class="table info-table mb-4">
                <tbody>
                    <tr>
                        <td data-i18n="info.poolNumLabel">題庫總題數</td>
                        <td><span id="info-pool-num" class="text-primary fw-bold">0</span> <span data-i18n="info.unitQuestion">題</span></td>
                    </tr>
                    <tr>
                        <td data-i18n="info.weightStatusLabel">權重狀態</td>
                        <td><span id="info-w-status">—</span></td>
                    </tr>
                    <tr>
                        <td data-i18n="info.explainStatusLabel">解說檔狀態</td>
                        <td><span id="info-e-status" data-i18n-init="messages.explainNotLoaded">未載入</span></td>
                    </tr>
                    <tr>
                        <td data-i18n="info.learnedLabel">已熟練（Easy，下回不出）</td>
                        <td><span id="info-learned" class="text-success fw-bold">0</span> <span data-i18n="info.unitQuestion">題</span></td>
                    </tr>
                    <tr>
                        <td data-i18n="info.unlearnedLabel">待學習（尚未標 Easy）</td>
                        <td><span id="info-unlearned" class="text-danger fw-bold">0</span> <span data-i18n="info.unitQuestion">題</span></td>
                    </tr>
                    <tr>
                        <td data-i18n="info.testNumLabel">本回合出題數</td>
                        <td><span id="info-test-num" class="text-primary fw-bold fs-5">0</span> <span data-i18n="info.unitQuestion">題</span></td>
                    </tr>
                    <tr>
                        <td data-i18n="info.passLineLabel">通過標準</td>
                        <td><span id="info-pass-line" class="fw-bold">—</span></td>
                    </tr>
                </tbody>
            </table>
            <button id="btn-start-quiz" class="btn btn-success btn-lg w-100 py-3 fs-5" onclick="startQuiz()" data-i18n="info.startButton">開始測驗</button>
            <button class="btn btn-link w-100 mt-2 text-secondary" onclick="showStep('step-home')" data-i18n="info.backButton">重新上傳檔案</button>
        </div>
    </div>

    <!-- ═══════ 測驗頁 ═══════ -->
    <div id="step-quiz" class="hidden">
        <div class="card-header-bar d-flex justify-content-between align-items-center px-4">
            <span id="quiz-counter" class="fw-bold">第 1 / 35 題</span>
            <span id="quiz-correct" class="fw-bold">答對：0</span>
        </div>
        <div class="card-body-wrap">
            <div class="progress-bar-wrap">
                <div class="progress">
                    <div id="quiz-progress" class="progress-bar bg-primary" style="width:0%"></div>
                </div>
            </div>
            <div id="question-text" class="question-box"></div>
            <div id="options-area"></div>
            <div id="quiz-feedback" class="alert hidden mt-3"></div>
            <div id="quiz-explain" class="explain-box hidden">
                <div class="explain-title" data-i18n="quiz.explainTitle">💡 相關技術解說</div>
                <div id="quiz-explain-text"></div>
            </div>
            <div id="anki-area" class="anki-area hidden">
                <p class="text-center text-muted mb-2 fw-bold" data-i18n="quiz.ankiLabel">請標記此題難易度：</p>
                <div class="row g-2">
                    <div class="col-3">
                        <button class="btn btn-hell w-100 py-3 fw-bold rounded-3" onclick="markAnki('HELL')">
                            <span data-i18n="quiz.hell.label">HELL</span><br>
                            <small style="font-size:0.75rem;opacity:0.85" data-i18n="quiz.hell.desc">非常困難</small>
                        </button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-hard w-100 py-3 fw-bold rounded-3" onclick="markAnki('HARD')">
                            <span data-i18n="quiz.hard.label">HARD</span><br>
                            <small style="font-size:0.75rem;opacity:0.85" data-i18n="quiz.hard.desc">困難</small>
                        </button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-good w-100 py-3 fw-bold rounded-3" onclick="markAnki('GOOD')">
                            <span data-i18n="quiz.good.label">GOOD</span><br>
                            <small style="font-size:0.75rem;opacity:0.85" data-i18n="quiz.good.desc">普通</small>
                        </button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-easy w-100 py-3 fw-bold rounded-3" onclick="markAnki('EASY')">
                            <span data-i18n="quiz.easy.label">EASY</span><br>
                            <small style="font-size:0.75rem;opacity:0.85" data-i18n="quiz.easy.desc">已熟練</small>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════ 結果頁 ═══════ -->
    <div id="step-result" class="hidden">
        <div class="card-header-bar">
            <h2 data-i18n="result.pageTitle">測驗結果</h2>
        </div>
        <div class="card-body-wrap text-center">
            <div class="score-display mb-2" id="res-score">0 / 0</div>
            <div class="mb-2 text-muted" id="res-pct">正確率：0%</div>
            <div class="mb-4">
                <span id="res-pass" class="pass-badge"></span>
            </div>
            <div id="res-pass-note" class="alert alert-secondary mb-4 text-start"></div>
            <div class="row g-3 justify-content-center">
                <div class="col-md-5">
                    <button class="btn btn-primary btn-lg w-100 py-3" onclick="doAction('RESTART')">
                        <span data-i18n="result.saveButton">儲存進度並繼續</span><br>
                        <small data-i18n="result.saveButtonSub">（儲存權重 → 資訊頁）</small>
                    </button>
                </div>
                <div class="col-md-5">
                    <button class="btn btn-outline-danger btn-lg w-100 py-3" onclick="doAction('RESET')">
                        <span data-i18n="result.resetButton">清空進度重練</span><br>
                        <small data-i18n="result.resetButtonSub">（重置所有權重 → 資訊頁）</small>
                    </button>
                </div>
            </div>
        </div>
    </div>

</div><!-- /main-card -->

<script>
// ─── 預設文字設定 ──────────────────────────────────────────
const DEFAULT_CONFIG = {
    app: {
        title: "台灣業餘無線電資格測試系統",
        subtitle: "ANKI 權重學習法"
    },
    home: {
        configFileLabel: "⚙️ 設定檔 (選擇性，.json)",
        configFileHint: "例：config.json　（省略則使用預設文字）",

        questionFileHint: "例：無線電通訊方法題庫.csv",
        weightFileLabel: "📊 權重檔案 (選擇性，.csv)",
        weightFileHint: "例：weight_無線電通訊方法題庫.csv　（省略則以全新等權重開始）",

    info: {

    },

        hell: { label: "HELL", desc: "非常困難" },
        hard: { label: "HARD", desc: "困難" },

    },

        pctTemplate: "正確率：{pct}%",
        passText: "及格 PASS ✓",
        failText: "不及格 FAIL ✗",
        saveButton: "儲存進度並繼續",
        saveButtonSub: "（儲存權重 → 資訊頁）",

        resetButtonSub: "（重置所有權重 → 資訊頁）"
    },
    messages: {
        noQuestionFile: "請選取題庫檔案！",
        configParseError: "設定檔解析失敗，將使用預設設定。\n",
        parseError: "題庫解析失敗，請確認 CSV 格式。",
        readError: "檔案讀取或解析失敗，請檢查檔案內容。\n",
        noQuestions: "無法生成題目，請確認題庫。",
        weightNew: "全新開始（等權重）",
        weightLoaded: "已載入歷史權重",

        weightMismatchStatus: "權重檔不符（已忽略）",

        explainParseError: "⚠️ 解說檔無法解析（格式不符或題號未匹配），已忽略解說檔。",

        passLineFull: "{needed} 題正確（{roundSize} 題制標準）",
        confirmReset: "確定要清空所有學習進度，將所有題目重置為等權重嗎？",
        resetDone: "⚠️ 您選擇了【清空進度重練】，所有題目已重置為等權重。",
        resetStatus: "重置為等權重",
        saveDone: "✅ 您選擇了【儲存並繼續】，學習進度已儲存，請開始下一回合。",
        answerCorrect: "✅ <strong>答對了！</strong>　正確答案為選項 ({ans})",
        answerWrong: "❌ <strong>答錯了！</strong>　正確答案為選項 ({ans})",
        resultNotePartial: "本回合實際出題 {actual} 題（可出題數不足 {roundSize} 題），以 80% 為通過標準，需答對 {needed} 題。",
        resultNoteFull: "本回合 {roundSize} 題制，通過標準為答對 {needed} 題。"

};

// ─── 全域狀態 ───────────────────────────────────────────────
let CFG = DEFAULT_CONFIG;

let questions = [];       // [{ans, text, opts:[4], id}]
let weights = [];         // 每題當前權重，Easy=0
let explanations = [];    // 每題解說文字（對應 questions 索引，無解說為 null）
let explainStatus = '';   // 顯示在資訊頁的解說檔狀態
let explainWarn = '';     // 解說檔警告訊息（格式錯誤等）
let sessionQueue = [];    // 本回合題目索引陣列
let curIdx = 0;           // sessionQueue 中的指標
let correctCount = 0;
let roundSize = 35;       // 本回合選定題數
let actualRound = 35;     // 實際出題數（可能 < roundSize）

const PASS_MAP = { 35: 25, 40: 32, 50: 40 };
const WEIGHT_HELL = 4.0;
const WEIGHT_HARD = 2.0;
const WEIGHT_GOOD = 0.5;
const WEIGHT_INIT = 1.0;

// ─── 文字設定工具 ──────────────────────────────────────────
// 讀取設定值，支援 "section.key" 點記法
function t(dotKey, params = {}) {
    const val = dotKey.split('.').reduce((obj, k) => (obj && obj[k] !== undefined) ? obj[k] : undefined, CFG);
    let str = (val !== undefined && typeof val === 'string') ? val : dotKey;
    return Object.entries(params).reduce((s, [k, v]) => s.split(`{${k}}`).join(String(v)), str);
}

// 深層合併兩個物件（source 覆蓋 target）
function deepMerge(target, source) {
    const result = Object.assign({}, target);
    for (const key of Object.keys(source)) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) &&
            target[key] && typeof target[key] === 'object') {
            result[key] = deepMerge(target[key], source[key]);
        } else {
            result[key] = source[key];
        }
    }
    return result;
}

// 將設定文字套用至帶有 data-i18n 屬性的 DOM 元素
function applyTexts() {
    document.title = t('app.title');
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
    });
}

// ─── CSV 解析 ─────────────────────────────────────────────
function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = splitCSVLine(line);
        if (parts.length >= 7) {
            result.push({
                id: parts[1].trim(),
                ans: parseInt(parts[0].replace(/[()]/g, '').trim()),
                text: parts[2].trim(),
                opts: [parts[3].trim(), parts[4].trim(), parts[5].trim(), parts[6].trim()]
            });
        }
    }
    return result;
}

function splitCSVLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else { cur += c; }
    }
    result.push(cur);
    return result;
}

// ─── 檔案載入 ─────────────────────────────────────────────
async function handleLoad() {
    const qFile = document.getElementById('file-q').files[0];
    if (!qFile) { alert(t('messages.noQuestionFile')); return; }

    roundSize = parseInt(document.querySelector('input[name="roundSize"]:checked').value);

    try {
        questions = parseCSV(await qFile.text());
        if (questions.length === 0) { alert(t('messages.parseError')); return; }

        // 初始化等權重
        weights = new Array(questions.length).fill(WEIGHT_INIT);

        let wStatus = t('messages.weightNew');
        let wWarn = '';

        const wFile = document.getElementById('file-w').files[0];
        if (wFile) {
            const wText = await wFile.text();
            const wLines = wText.trim().split(/\r?\n/).slice(1).filter(l => l.trim());
            if (wLines.length !== questions.length) {
                wWarn = t('messages.weightMismatch', { wCount: wLines.length, qCount: questions.length });
                wStatus = t('messages.weightMismatchStatus');
            } else {
                wLines.forEach((line, i) => {
                    const parts = line.split(',');
                    const w = parts.length >= 2 ? parseFloat(parts[1]) : WEIGHT_INIT;
                    weights[i] = isNaN(w) ? WEIGHT_INIT : w;
                });
                wStatus = t('messages.weightLoaded');
            }
        }

        // 解題說明檔（選擇性）
        explanations = new Array(questions.length).fill(null);
        explainStatus = t('messages.explainNotLoaded');
        explainWarn = '';
        const eFile = document.getElementById('file-e').files[0];
        if (eFile) {
            const eText = await eFile.text();
            const matched = parseExplainMD(eText);
            if (matched === 0) {
                explainWarn = t('messages.explainParseError');
                explainStatus = t('messages.explainParseErrorStatus');
                explanations.fill(null);
            } else if (matched < questions.length) {
                explainStatus = t('messages.explainPartial', { matched, total: questions.length });
            } else {
                explainStatus = t('messages.explainFull', { matched });
            }
        }

        renderInfoPage(wStatus, wWarn, null);
        showStep('step-info');
    } catch (e) {
        alert(t('messages.readError') + e.message);
    }
}

// ─── 解說 MD 解析 ──────────────────────────────────────────
// 格式：* **題目 N**：... * **相關技術解說**：...（下一個 * **題目 N+1** 前結束）
function parseExplainMD(text) {
    // Split on question boundaries: "題目 N" (N is a number)
    const blocks = text.split(/\*\s*\*\*題目\s+(\d+)\*\*[：:]/);
    // blocks: [preamble, "1", content1, "2", content2, ...]
    let count = 0;
    for (let i = 1; i < blocks.length; i += 2) {
        const qNum = parseInt(blocks[i]);        // 1-based question number
        const content = blocks[i + 1] || '';
        // Extract text after 相關技術解說：
        const match = content.match(/\*\s*\*\*相關技術解說\*\*[：:]\s*([\s\S]*?)(?=\*\s*\*\*題目|\*\*提示|$)/);
        if (match) {
            const explain = match[1].trim()
                .replace(/\[\d+\]/g, '')          // remove footnote markers like [1]
                .replace(/^\*\s+/gm, '')           // strip leading "* " on bullet lines
                .trim();
            // Map 1-based question number to 0-based index
            const idx = qNum - 1;
            if (idx >= 0 && idx < explanations.length) {
                explanations[idx] = explain;
                count++;
            }
        }
    }
    return count;
}

// ─── 資訊頁 ───────────────────────────────────────────────
function renderInfoPage(wStatus, wWarn, pathMsg) {
    const learned   = weights.filter(w => w === 0).length;
    const unlearned = weights.filter(w => w > 0).length;
    const available = unlearned;
    const allEasy   = available === 0;

    // Sub-case 3: when all marked Easy, show — so user isn't misled
    actualRound = allEasy ? 0 : Math.min(roundSize, available);

    document.getElementById('info-pool-num').textContent  = questions.length;
    document.getElementById('info-w-status').textContent  = wStatus || '—';
    document.getElementById('info-learned').textContent   = learned;
    document.getElementById('info-unlearned').textContent = unlearned;
    document.getElementById('info-test-num').textContent  = allEasy ? '—' : actualRound;

    // 通過標準 — three branches
    let passLine;
    if (allEasy) {
        passLine = t('messages.allEasyPassLine');
    } else if (actualRound < roundSize) {
        const needed = Math.ceil(actualRound * 0.8);
        passLine = t('messages.passLinePartial', { needed, actual: actualRound });
    } else {
        const needed = PASS_MAP[roundSize] || Math.ceil(roundSize * 0.8);
        passLine = t('messages.passLineFull', { needed, roundSize });
    }
    document.getElementById('info-pass-line').textContent = passLine;

    // 開始按鈕文字
    document.getElementById('btn-start-quiz').textContent =
        allEasy ? t('info.resetStartButton') : t('info.startButton');

    // 路徑訊息 / 全部熟練提示
    const pathEl = document.getElementById('info-path-msg');
    if (allEasy && !pathMsg) {
        pathEl.className = 'alert alert-info mb-3';
        pathEl.textContent = t('messages.allEasyInfo');
        pathEl.classList.remove('hidden');
    } else if (pathMsg) {
        pathEl.className = `alert ${pathMsg.type} mb-3`;
        pathEl.textContent = pathMsg.text;
        pathEl.classList.remove('hidden');
    } else {
        pathEl.classList.add('hidden');
    }

    // 權重警告
    const warnEl = document.getElementById('info-w-warn');
    if (wWarn) {
        warnEl.textContent = wWarn;
        warnEl.classList.remove('hidden');
    } else {
        warnEl.classList.add('hidden');
    }

    // 解說檔狀態
    document.getElementById('info-e-status').textContent = explainStatus;
    const eWarnEl = document.getElementById('info-e-warn');
    if (explainWarn) {
        eWarnEl.textContent = explainWarn;
        eWarnEl.classList.remove('hidden');
    } else {
        eWarnEl.classList.add('hidden');
    }
}

// ─── 開始測驗 ─────────────────────────────────────────────
function startQuiz() {
    const validIndices = weights.map((w, i) => w > 0 ? i : -1).filter(i => i !== -1);
    if (validIndices.length === 0) {
        // Auto-reset and fall through — info page already showed the all-easy notice
        weights.fill(WEIGHT_INIT);
        validIndices.length = 0;
        weights.forEach((w, i) => { if (w > 0) validIndices.push(i); });
        actualRound = Math.min(roundSize, validIndices.length);
    }

    sessionQueue = [];
    curIdx = 0;
    correctCount = 0;

    // 加權隨機抽題（不重複）
    const pool = [...weights];
    for (let i = 0; i < actualRound; i++) {
        const picked = weightedRandom(pool);
        if (picked === -1) break;
        sessionQueue.push(picked);
        pool[picked] = 0; // 抽過不再重複
    }

    if (sessionQueue.length === 0) { alert(t('messages.noQuestions')); return; }
    actualRound = sessionQueue.length;

    showStep('step-quiz');
    renderQuestion();
}

function weightedRandom(wArr) {
    const sum = wArr.reduce((a, b) => a + b, 0);
    if (sum <= 0) return -1;
    let r = Math.random() * sum;
    for (let i = 0; i < wArr.length; i++) {
        r -= wArr[i];
        if (r < 0) return i;
    }
    return -1;
}

// ─── 出題 ─────────────────────────────────────────────────
function renderQuestion() {
    const q = questions[sessionQueue[curIdx]];
    const pos = curIdx + 1;

    document.getElementById('quiz-counter').textContent = t('quiz.counterTemplate', { pos, total: actualRound });
    document.getElementById('quiz-correct').textContent = t('quiz.correctTemplate', { count: correctCount });
    document.getElementById('quiz-progress').style.width = `${((pos - 1) / actualRound) * 100}%`;

    document.getElementById('question-text').innerHTML =
        `<strong>${t('quiz.questionPrefix', { pos })}</strong>　${escapeHTML(q.text)}`;

    const optArea = document.getElementById('options-area');
    optArea.innerHTML = '';
    q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.dataset.idx = i + 1;
        btn.onclick = () => selectOption(btn);
        optArea.appendChild(btn);
    });

    document.getElementById('quiz-feedback').classList.add('hidden');
    document.getElementById('quiz-explain').classList.add('hidden');
    document.getElementById('anki-area').classList.add('hidden');
}

function selectOption(btn) {
    // 若已顯示 ANKI 區則不允許再改答案
    if (!document.getElementById('anki-area').classList.contains('hidden')) return;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    checkAnswer(parseInt(btn.dataset.idx));
}

function checkAnswer(chosen) {
    const q = questions[sessionQueue[curIdx]];
    const isRight = chosen === q.ans;
    if (isRight) correctCount++;

    // 標色
    document.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        const n = parseInt(b.dataset.idx);
        if (n === q.ans) b.classList.add('correct');
        else if (n === chosen && !isRight) b.classList.add('wrong');
    });

    // 回饋訊息
    const fb = document.getElementById('quiz-feedback');
    fb.className = `alert mt-3 ${isRight ? 'alert-success' : 'alert-danger'}`;
    fb.innerHTML = isRight
        ? t('messages.answerCorrect', { ans: q.ans })
        : t('messages.answerWrong', { ans: q.ans });
    fb.classList.remove('hidden');

    // 顯示解說（若有載入）
    const qIdx = sessionQueue[curIdx];
    const explainEl = document.getElementById('quiz-explain');
    const explainText = explanations[qIdx];
    if (explainText) {
        document.getElementById('quiz-explain-text').textContent = explainText;
        explainEl.classList.remove('hidden');
    } else {
        explainEl.classList.add('hidden');
    }

    document.getElementById('anki-area').classList.remove('hidden');
}

// ─── ANKI 標記 ────────────────────────────────────────────
function markAnki(level) {
    const qIdx = sessionQueue[curIdx];
    if (level === 'EASY')      weights[qIdx] = 0;
    else if (level === 'GOOD') weights[qIdx] = Math.max(weights[qIdx] * WEIGHT_GOOD, 0.1);
    else if (level === 'HARD') weights[qIdx] = weights[qIdx] <= 0 ? WEIGHT_HARD : weights[qIdx] * WEIGHT_HARD;
    else if (level === 'HELL') weights[qIdx] = weights[qIdx] <= 0 ? WEIGHT_HELL * 2 : weights[qIdx] * WEIGHT_HELL;

    curIdx++;
    if (curIdx < sessionQueue.length) {
        renderQuestion();
    } else {
        showResult();
    }
}

// ─── 結果頁 ───────────────────────────────────────────────
function showResult() {
    showStep('step-result');

    const pct = Math.round((correctCount / actualRound) * 100);
    document.getElementById('res-score').textContent = `${correctCount} / ${actualRound}`;
    document.getElementById('res-pct').textContent = t('result.pctTemplate', { pct });

    let passed;
    let passNote;
    if (actualRound < roundSize) {
        const needed = Math.ceil(actualRound * 0.8);
        passed = correctCount >= needed;
        passNote = t('messages.resultNotePartial', { actual: actualRound, roundSize, needed });
    } else {
        const needed = PASS_MAP[roundSize] || Math.ceil(roundSize * 0.8);
        passed = correctCount >= needed;
        passNote = t('messages.resultNoteFull', { roundSize, needed });
    }

    const passEl = document.getElementById('res-pass');
    passEl.textContent = passed ? t('result.passText') : t('result.failText');
    passEl.className = `pass-badge ${passed ? 'bg-success text-white' : 'bg-danger text-white'}`;

    document.getElementById('res-pass-note').textContent = passNote;
}

// ─── 結束動作 ─────────────────────────────────────────────
function doAction(mode) {
    if (mode === 'RESET') {
        if (!confirm(t('messages.confirmReset'))) return;
        weights.fill(WEIGHT_INIT);
        renderInfoPage(t('messages.resetStatus'), '', { type: 'alert-warning', text: t('messages.resetDone') });
    } else {
        exportWeights();
        renderInfoPage(t('messages.weightLoaded'), '', { type: 'alert-success', text: t('messages.saveDone') });
    }
    showStep('step-info');
}

function exportWeights() {
    let csv = 'ID,Weight\n';
    questions.forEach((q, i) => { csv += `${q.id},${weights[i]}\n`; });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = 'weight.csv';
    a.click();
}

// ─── 工具函式 ─────────────────────────────────────────────
function showStep(id) {
    ['step-home', 'step-info', 'step-quiz', 'step-result'].forEach(s => {
        document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
    window.scrollTo(0, 0);
}

function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── 初始化 ───────────────────────────────────────────────
if (window.APP_CONFIG) {
    CFG = deepMerge(DEFAULT_CONFIG, window.APP_CONFIG);
}
applyTexts();
</script>
